{% extends "base.html" %}

{% block title %}Add New Recipe{% endblock %}

{% block content %}
<h1>Add a New Recipe</h1>

<form method="POST">
	<div>
		<label>Title:</label><br>
		<input type="text" name="title" required>
	</div>

	<div>
		<label>Description:</label><br>
		<textarea name="description" rows="3" required></textarea>
	</div>

	<div>
		<label>Ingredients (one per line):</label><br>
		<textarea name="ingredients" rows="5" required></textarea>
		<br><small>Enter each ingredient on a new line</small>
	</div>

	<div>
		<label>Instructions (one per line):</label><br>
		<textarea name="instructions" rows="5" required></textarea>
		<br><small>Enter each step on a new line</small>
	</div>

	<div>
		<label>Prep Time (minutes):</label><br>
		<input type="number" name="prep_time" required>
	</div>

	<div>
		<label>Cook Time (minutes):</label><br>
		<input type="number" name="cook_time" required>
	</div>

	<div>
		<label>Difficulty:</label><br>
		<select name="difficulty">
			<option value="Easy">Easy</option>
			<option value="Medium">Medium</option>
			<option value="Hard">Hard</option>
		</select>
	</div>

	<div>
		<label>Cuisine:</label><br>
		<input type="text" name="cuisine" required>
	</div>

	<div>
		<button type="submit">Add Recipe</button>
	</div>
</form>

<p><a href="{{ url_for('index') }}">Cancel</a></p>
{% endblock %}
